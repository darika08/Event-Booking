<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Booking Website</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#f5f5f5;
    }

    header{
      background:#222;
      color:white;
      padding:15px 30px;

      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header button{
      margin-left:10px;
      padding:8px 15px;
      border:none;
      background:#ff9800;
      color:white;
      cursor:pointer;
      border-radius:5px;
    }

    header button:hover{
      background:#e68900;
    }

    .auth-container{
      width:100%;
      display:flex;
      justify-content:center;
      margin-top:50px;
    }

    .form-box{
      background:white;
      padding:30px;
      width:320px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    .form-box h2{
      margin-bottom:20px;
      text-align:center;
    }

    .form-box input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:5px;
    }

    .form-box button{
      width:100%;
      padding:12px;
      background:#2196f3;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .form-box button:hover{
      background:#0b7dda;
    }

    .hidden{
      display:none;
    }

    .events{
      padding:40px;
    }

    .events h2{
      margin-bottom:20px;
    }

    .event-card{
      background:white;
      padding:20px;
      margin-bottom:20px;
      border-radius:10px;
      box-shadow:0 0 8px rgba(0,0,0,0.1);
    }

    .event-card button{
      margin-top:10px;
      padding:10px 15px;
      border:none;
      background:#4caf50;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }

    .event-card button:hover{
      background:#3d8c40;
    }

    .booking-section{
      padding:40px;
    }

    .booking-section ul{
      margin-top:15px;
    }

    .booking-section li{
      background:white;
      padding:10px;
      margin-bottom:10px;
      border-radius:5px;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <h1>Event Booking System</h1>

    <nav>
      <button id="showLogin">Login</button>
      <button id="showRegister">Register</button>
      <button id="logoutBtn" style="display:none;">Logout</button>
    </nav>
  </header>

  <!-- Authentication Section -->
  <section class="auth-container">

    <!-- Login Form -->
    <div class="form-box" id="loginBox">
      <h2>Login</h2>

      <input type="email" id="loginEmail" placeholder="Enter Email"/>
      <input type="password" id="loginPassword" placeholder="Enter Password"/>

      <button onclick="login()">Login</button>
    </div>

    <!-- Register Form -->
    <div class="form-box hidden" id="registerBox">
      <h2>Register</h2>

      <input type="text" id="registerName" placeholder="Enter Name"/>
      <input type="email" id="registerEmail" placeholder="Enter Email"/>
      <input type="password" id="registerPassword" placeholder="Create Password"/>

      <button onclick="register()">Register</button>
    </div>
  </section>

  <!-- Event Section -->
  <section class="events hidden" id="eventSection">
    <h2>Available Events</h2>

    <div class="event-card">
      <h3>Music Concert</h3>
      <p>Date: 20 June 2026</p>
      <p>Location: Chennai</p>
      <button onclick="bookEvent('Music Concert')">Book Now</button>
    </div>

    <div class="event-card">
      <h3>Tech Conference</h3>
      <p>Date: 5 July 2026</p>
      <p>Location: Bangalore</p>
      <button onclick="bookEvent('Tech Conference')">Book Now</button>
    </div>

    <div class="event-card">
      <h3>Startup Meetup</h3>
      <p>Date: 15 August 2026</p>
      <p>Location: Hyderabad</p>
      <button onclick="bookEvent('Startup Meetup')">Book Now</button>
    </div>
  </section>

  <!-- Booking Section -->
  <section class="booking-section hidden" id="bookingSection">
    <h2>Your Bookings</h2>
    <ul id="bookingList"></ul>
  </section>

  <script>

    // Show Login/Register Forms
    const loginBox = document.getElementById("loginBox");
    const registerBox = document.getElementById("registerBox");

    document.getElementById("showLogin").addEventListener("click", () => {
      loginBox.classList.remove("hidden");
      registerBox.classList.add("hidden");
    });

    document.getElementById("showRegister").addEventListener("click", () => {
      registerBox.classList.remove("hidden");
      loginBox.classList.add("hidden");
    });

    // Register User
    function register() {

      const name = document.getElementById("registerName").value;
      const email = document.getElementById("registerEmail").value;
      const password = document.getElementById("registerPassword").value;

      if(name === "" || email === "" || password === ""){
        alert("Please fill all fields");
        return;
      }

      const user = {
        name,
        email,
        password
      };

      localStorage.setItem("user", JSON.stringify(user));

      alert("Registration Successful!");

      registerBox.classList.add("hidden");
      loginBox.classList.remove("hidden");
    }

    // Login User
    function login(){

      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;

      const savedUser = JSON.parse(localStorage.getItem("user"));

      if(!savedUser){
        alert("No user found. Please register first.");
        return;
      }

      if(email === savedUser.email && password === savedUser.password){

        alert("Login Successful!");

        localStorage.setItem("loggedIn", "true");

        showEvents();

      }else{
        alert("Invalid Credentials");
      }
    }

    // Show Event Section
    function showEvents(){

      document.querySelector(".auth-container").classList.add("hidden");

      document.getElementById("eventSection").classList.remove("hidden");

      document.getElementById("bookingSection").classList.remove("hidden");

      document.getElementById("logoutBtn").style.display = "inline-block";
    }

    // Book Event
    function bookEvent(eventName){

      let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

      bookings.push(eventName);

      localStorage.setItem("bookings", JSON.stringify(bookings));

      displayBookings();

      alert(eventName + " booked successfully!");
    }

    // Display Bookings
    function displayBookings(){

      const bookingList = document.getElementById("bookingList");

      bookingList.innerHTML = "";

      let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

      bookings.forEach((event, index) => {

        let li = document.createElement("li");

        li.textContent = `${index + 1}. ${event}`;

        bookingList.appendChild(li);
      });
    }

    // Logout
    document.getElementById("logoutBtn").addEventListener("click", () => {

      localStorage.removeItem("loggedIn");

      location.reload();
    });

    // Auto Login Check
    window.onload = () => {

      if(localStorage.getItem("loggedIn") === "true"){

        showEvents();
        displayBookings();
      }
    };

  </script>

</body>
</html>
